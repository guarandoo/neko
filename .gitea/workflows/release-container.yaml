name: Go
on:
  push:
    branches:
      - actions
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          force-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: gitea.calliope.rip
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Debug
        id: metadata
        run: 'echo "Gitea context: ${{ toJson(gitea) }}"'
      - name: Get metadata
        uses: actions/metadata-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            gitea.calliope.rip/${{ gitea.repository }}:${{ steps.metadata.outputs.sha }}
            gitea.calliope.rip/${{ gitea.repository }}:${{ steps.metadata.outputs.tag }}
            gitea.calliope.rip/${{ gitea.repository }}:latest