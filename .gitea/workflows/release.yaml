name: binary
on:
  push:
    branches:
      - main
    tags:
      - "v*"
jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          force-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # - name: Run tests
      #   run: |
      #     go mod tidy
      #     go test ./...
      - name: Get metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY }}/${{ gitea.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Generate build metadata
        id: build_meta
        run: |
          echo "version=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LDFLAGS="-X 'main.Version=${{ steps.build_meta.outputs.version }}' -X 'main.Commit=${{ steps.build_meta.outputs.revision }}' -X 'main.BuildTime=${{ steps.build_meta.outputs.build_time }}'"
  binary:
    runs-on: ubuntu-latest
    if: startsWith(gitea.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          force-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release -f .goreleaser.yaml --clean
        env:
          GITEA_TOKEN: ${{ secrets.REGISTRY_PASSWORD }}
