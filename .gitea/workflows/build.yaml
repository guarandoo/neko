  publish:
    runs-on: ubuntu-latest
    # needs: build
    env:
      DOCKER_ORG: guarandoo
      DOCKER_LATEST: latest
    steps:
      - uses: actions/checkout@v4
        with:
          force-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."gitea.calliope.rip"]
              http = true
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: gitea.calliope.rip
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      # - name: Build Docker image
      #   uses: docker/build-push-action@v4
      #   with:
      #     context: .
      #     file: ./Dockerfile
      #     platforms: |
      #       linux/amd64
      #     push: true
      #     tags: |
      #       gitea.calliope.rip/${{ gitea.repository }}:${{ gitea.sha }}
      #       gitea.calliope.rip/${{ gitea.repository }}:${{ env.DOCKER_LATEST }}
      - name: Build Docker image
        run: docker buildx build --load -t gitea.calliope.rip/${{ gitea.repository }}:${{ gitea.sha }} .
      - name: Tag Docker image
        run: |
          docker tag gitea.calliope.rip/${{ gitea.repository }}:${{ gitea.sha }} gitea.calliope.rip/${{ gitea.repository }}:${{ env.DOCKER_LATEST }}
      - name: Push Docker image
        run: |
            docker push gitea.calliope.rip/${{ gitea.repository }}:${{ gitea.sha }}
            docker push gitea.calliope.rip/${{ gitea.repository }}:${{ env.DOCKER_LATEST }}