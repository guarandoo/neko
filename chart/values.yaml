image:
  registry: gitea.calliope.rip
  repository: guarandoo/neko
  tag: v0.0.5
  pullPolicy: IfNotPresent
deployment:
  enabled: true
  kind: Deployment
  replicas: 1
  revisionHistoryLimit: 1
  labels: {}
  annotations: {}
  minReadySeconds: 0
  podAnnotations: {}
  podLabels: {}
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
nameOverride:
fullnameOverride:
config: {}
# affinity:
#   podAntiAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       - labelSelector:
#           matchExpressions:
#             - key: app.kubernetes.io/name
#               operator: In
#               values:
#                 - neko
#         topologyKey: topology.kubernetes.io/zone
extraEnv:
  - name: NEKO_INSTANCE
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
