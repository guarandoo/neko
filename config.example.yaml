notifiers:
  my_discord_notifier:
    type: discord_webhook
    config:
      url: https://discord.com/api/webhooks/webhook_id/webhook_token
      # reuseMessage:
      #   enable: true
      #   lastMessageId:
  my_smtp_notifier:
    type: smtp
    config:
      host: smtp.example.com
      port: 587
      username: smtp_user
      password: smtp_secret
      sender: neko@example.com
      recipients:
        - john.doe@example.com
monitors:
  ssh-monitor:
    interval: 1m
    probe:
      type: ssh
      config:
        host: some-machine.example.com
    notifiers:
      - my_discord_notifier
      - my_smtp_notifier
  ping-monitor:
    interval: 1m
    probe:
      type: ping
      config:
        address: some-machine.example.com
    notifiers:
      - my_discord_notifier
      - my_smtp_notifier
  http-monitor:
    interval: 1m
    probe:
      type: http
      config:
        address: https://example.com
        maxRedirects: 1
    notifiers:
      - my_discord_notifier
      - my_smtp_notifier
  domain-monitor:
    interval: 1d
    probe:
      type: domain
      config:
        domain: https://example.com
    notifiers:
      - my_discord_notifier
      - my_smtp_notifier
